name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build workspaces
        run: npm run build

      # NOTE: committing node_modules can make the deploy branch large.
      # Fallback: drop node_modules from the artifact and run `npm ci --omit=dev`
      # in the Pterodactyl install step instead.
      - name: Stage runtime artifact on orphan branch
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          set -euo pipefail
          STAGE="$(mktemp -d)"

          # Collect runtime files: built JS, prisma schema/migrations, root manifests, runtime hooks.
          rsync -a --prune-empty-dirs \
            --include='*/' \
            --include='dist/***' \
            --exclude='node_modules/***' \
            --exclude='.turbo/***' \
            --exclude='coverage/***' \
            --exclude='*.test.*' \
            apps/ "$STAGE/apps/"
          rsync -a --prune-empty-dirs \
            --include='*/' \
            --include='dist/***' \
            --exclude='node_modules/***' \
            --exclude='.turbo/***' \
            --exclude='coverage/***' \
            --exclude='*.test.*' \
            packages/ "$STAGE/packages/"

          cp -R prisma "$STAGE/prisma"
          cp package.json package-lock.json prisma.config.ts "$STAGE/"
          cp .bash_profile "$STAGE/.bash_profile"
          cp .env.example "$STAGE/.env.example"
          [ -f README.md ] && cp README.md "$STAGE/README.md" || true

          # Install production deps so Pterodactyl can start without network if desired.
          # Comment out this block to use the panel install step instead.
          (cd "$STAGE" && npm ci --omit=dev --ignore-scripts)
          (cd "$STAGE" && npx prisma generate)

          cd "$STAGE"
          git init -q -b deploy
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          echo '!node_modules' > .gitignore
          git add -A
          git commit -q -m "deploy: ${{ github.sha }}"
          git push --force origin deploy